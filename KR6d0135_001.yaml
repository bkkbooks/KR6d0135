body:
  text: 長文廣義悉備輔行其間數科數節義意或不同或義意是同而尋文難見或科節文勢奢促不定略出科文并數節義自備遺忘豈曰示人也釋題三一意二義三文意者大師自云說己心中所證法門所證者何謂諸佛心印何時證此謂靈鷲中憑何典據別傳云大師見南嶽南嶽笑曰昔共靈山同聽法華宿緣所追今復來矣大師未悟南嶽曰肉身菩薩經生忘矣可入普賢道場至二七日豁然定慧開發從定起白師師曰非爾不證非我不知爾所證者法華三昧得陀羅尼者旋陀羅尼自今已後文字法師暗證禪師千羣萬衆尋爾之辨莫能究也當為說法人中最為第一時年二十三便獲心印機緣未會未有傳受但講大品智論法華仁王光明維摩等經而玄解未吐至開皇十四年年五十七為報生地恩歸荊州造玉泉寺寺成訖說止觀以申元意義乃不異衆經而研心造境布致十乘萬德三千併在一念逈超義表卓爾不羣意令今日合座之人便即入如來室著如來衣坐如來座日用佛心日行佛事矣義者五重玄義出自天台釋一切經論皆須五義五義束一部盡矣謂名體宗用教也名者卷首止觀明靜即釋名也若別配文即五略中大意十廣中釋名是也大意約四教簡諦境釋名約待絶明觀智智必照境境智稱會其名生焉大意云既知無明即明不復流動故名為止朗然大淨呼之為觀此兩文釋名竟二出體三德圓融體也若約文五略中歸大處十廣中體相并旨歸此三科竝明三身三德體也指歸文雖不說義不異前兩科意也三明宗者寂照交徹宗也涅槃云定慧平等見佛性當文云兩手遞互楷摩雲日相資方致牙象約文五略中大行十廣中正修此兩門是一部之宗主行人之歸趣修心處也四辨用者破遍證圓為用也破遍則惑無不盡證圓則德無不備五略中感大果十廣中橫豎破遍第八果報此三文是也五教相者一多互陳教相也五略中裂大網十廣中攝法偏圓方便四門竝教相也故一微塵中出大千經卷八教五味並自一心教相明矣且分文屬當即爾據圓旨一一文一一義皆具五也此乃分而不分不分而分固在意得耳摩訶褒美之詞止觀尅明心性章安初題圓頓後改摩訶改者意何圓頓尊極之稱摩訶包攝周悉約理宜尊極約教宜周悉周悉具三即攝漸次不定五時八教盡矣故改從也摩訶三義往翻大多勝也此三皆絶待不對小少劣受名法非小大一多勝劣小即大故一即多故劣即勝故何以故法性圓妙無隔礙故是以一塵一毫悉包納法界也今言大即空多即假勝即中此三皆一色一香一念中足也一念寂然圓極法界為止一念朗然圓照法界為觀止即般若觀即解脫止觀不二即法身在心謂之三觀在境謂之三諦在體謂之三德在用謂之三身在性謂之三涅槃在智謂之三菩提在凡謂之三道在聖謂之三寶雖迷悟得失千途而一性未嘗變易也前代未聞止觀為三世佛母未聞止觀為十方菩薩祖師未聞止觀為一切教理行位之主未聞止觀為一切學人智鏡未聞止觀照己身心全同佛德令喜於大師座下親聞故也儒說生知一世義也釋辨三世成性也萬法元本從緣故生生性常空號天真理理不獨立常在萬緣緣理兼懷乃名大士妄緣取理乃曰小乘妄理取緣流轉九有反本還源須假師傳照本境寂我無師保經曰不得一法故得授記授記師也不得無師也師不偏屬因有理觀故無師不偏屬果佛師法常也若謂無真在因緣事外凡夫未了聖智方證此別教也即我觀智照因緣生滅悉無自性即全無真圓教也圓頓現前即入佛位萬行萬德一念中具十卷止觀千度說此若不信此天台教門絶矣始鹿苑不言寂場者且從跡說祖承為便若望本說何妨二十四祖悉游華嚴海中九代祖師融寂覺跡義等下文破古有此說既非正義祖宗不成九代之名請從此削無漏總中三此段文古今共難輔行四紙釋兼破古九不可講者敘述甚自煩閙昨尋本文文近在前止火血刀達三善道次修禪定次修無漏次修慈悲次修實相此文是也無漏若合但有九無漏若開兩教二乘成四即十二不定四取體中四或指世界下總四或字是四句意謂實相難解藉漸次不定導進其心便有九句十三句階級然後方達實相故有此三種止觀也泛論漸次不定圓頓有四不同一約教論八教中頓漸不定此指華嚴唯頓五時漸次而生漸也一一部中或具不具不定也二約部論華嚴唯頓四含唯漸方等不定法華唯圓三約法論下引淨名大品法華涅槃無量義等各有此三是也四約義三種止觀皆是大乘俱緣實相借漸不定以助圓修是也此四義意各異可深思之勿使濫也此四漸中法華具三漸大師自云從牛出乳乃至醍醐此證漸也此約五時相次生名漸非法漸也如是之人應以此法漸入佛慧此敘昔有此漸法也乃至舉一手或復小低頭此是圓人用漸義助修也約部法華唯圓無復兼但對帶會諸權小歸一乘故約時法義何妨三漸何纍於圓情無情一輔行十解文理周悉今助一釋內外心境別俗諦事也察內心無性外境無實真諦理也理而觀之未嘗有二事而見之未嘗不二二不二於一念中得此一念達了之智非內非外而內而外十方三世只一念中念外無法斯極理也若謂念內念外有一法可得悉為虗妄非真慧也目此真慧以為佛性佛性現時豈存心境乎略指三門大意在一頓者三門謂序中三種止觀漸次不定圓頓也大意在一頓者唯圓也準輔行生起問答非大師料簡是章安也記云剪略身儀名一行非約一理今尋經意乃從理得名文云如聞修學能入一行三昧面見諸佛據此乃約一理受名此四三昧坐行半行半坐非行非坐竝從事一行般舟法華方等隨意竝從理可思例四種三昧意止觀引文雖異體乃同今取意總釋只達一念自心是法界十方諸佛與一切衆生同一無住本一法界為身為土無彼無此無根無住處無修不修無證不證無凡無聖但衆生自謂妄想纏縛為凡為不修為不證謂佛為聖為證修證聖在衆生自強立之佛位中都無此名也諸佛所見一切身是法身一切國土是佛國土一切法是佛法一切心是一心極十方三際推求無纖毫許若色若心不是佛理智鏡朗然周遍法界嘗無一事淡然身心無所施為佛心既然我學佛智如佛用心即止觀也佛現即我心現而不現只是自心鏡上影像耳問豈都無外佛可見耶答自他不二但如來有同體大悲衆生有熏習之力扣擊同體智鏡隨其心上感見相好鏡中之像然不離鏡而非即鏡隨照好醜感者千差相亦萬品或機深厚感佛身長千萬由旬壽命無量阿僧祇劫以河沙世界微塵佛剎為淨妙國土說無量無邊不可說不可說法門或人天報殊示現八相一斯利益不過數百年間或三途微形含血之類見聞異身暫能救苦如空雲水月恍忽不定斯皆由感者一念之心謂佛色身來應佛實無來去之勞無有形之患無可說之法但衆生善緣心想謂佛應來為我說法實是衆生於自心上現此相耳問衆生善根擊佛大圓智鏡現此影像像則屬佛答明鏡屬佛像不屬佛像若屬佛佛則生滅流動若屬衆生衆生業結所縛何能具此相好但衆生感應道交方見此耳問既是佛智鏡上像何言衆生心上現答同體圓鏡不偏屬佛衆生同一體故但衆生磨瑩己鏡未得全明故能暫現此相表進修之力問若爾衆生自感心鏡上現像不得言佛像現佛即於衆生無力虗致敬慕有何益也答由敬慕之心感像現也此真佛力豈衆生能致哉問此亦衆生自蒙佛力非他佛力也答佛地無自他汝強謂自他佛者衆生心不盡耳問若爾亦共作一大佛不能各各自成也答不共作一不各各自成此義難了試舉喻首如國清寺法界也住寺僧古佛也遠人暫遊暫感佛也他日愛慕即剃髮配寺國清即我寺也五峰松徑臺殿房廊悉我有也頓得受用不減他物成我家也不人人別造一寺也不共他分一寺分即隨人將去常住法界不可分也此義出涅槃經中路有一大樹樹陰清涼來者即納無人遮護無持去者既印金口可以奉持還轉四句不見未貪滅欲貪欲生記云剩生字道邃和尚云不剩還轉者翻轉四句不見未貪欲滅欲貪生等前言為當當是未審定詞今言不見是印定說故兩番別若準此說但有兩箇四句無餘諸句準輔行轉至第二不生句故剩生字詳文不合錯剩取義輔行無違執若未盡竝須推破故問玄文七重二諦三接止觀何但五重一接答約諦理相生漸深有七義約人智但五何者通人八地後聞中修觀伏惑名菩薩破無明名佛佛是通教果果頭無人只是別教初地故名別接通別圓兩人初聞中道故不名接故只一接問別地即圓住何非圓接通答初將教接藉空假為方便故證方名地地住既一不復名接玄文三接復云何答別接通如文圓接通者從二諦入不次第三諦也圓接別者從次第入不次第也但有三義無有三人別人先自知不次第故約諦故三約人故一若剋實論三教果頭無人但修三教因入一圓果何接之有今言接者蓋義門耳問接是連義為接取接入義答兩界中間須安一接即似連義責實而論但是接得入別教中非連問連義何妨答文云但可別接不可接別若是連義別教接接別何異文云不將此果接十地之因故不接別不接十住斷無明故不接圓問接別義如何答若將通佛接取別家行位入通果中方名接別今既不爾故不接別不接圓例別非色非心為戒體者準百法論是無表色此色法處所攝有一極逈二極略三遍計四受所引五定果今戒體正是受所引因領受師言引起此色故名受所引內外大小乘戒悉以此為體其體是思願種子如何人欲受戒時皆思願欲得戒此是現思願熏在藏識名種子至壇場上三番羯磨竟師告云汝已得戒竟更不起思願心唯有種子能防七支以為戒體此種子非色不對礙故非心不緣慮故若言色為體是無表色故若言心為體是思願種子故隨部異名體更不易輔行云別教從心生十界圓教心具十界也生者心但有能生十界性未即便是十界如從地生一切草木也具者即一念心全具十界不待生亦無前後只一念是十界只十界是一念一切時一切處一切法念念之中體常圓滿塵沙萬德不缺少一分八萬惑業不除斷一分不謂佛果是極聖我未證得不謂凡是底下穢濁我應捨離總攬法界在一念心頭如一圓珠瑩徹明白圓解更無別覺觀進修亦不見有凡聖取捨分別妄念悉盡也問既云念盡應齊極聖答心性本體齊上聖大師云見己智慧與如來等但未能常照隨境生心此心分別校計萬端把人有時猶不定或發地獄心餓鬼畜生心何況三善何況小乘無始妄習何能頓遣雖有解心未常用解故是凡也若能暫照諦理即坐佛座證佛身用佛法當此一念圓現時不見十方佛異我此身此念也解而未修是名字即念有分數名觀行即念似於境名相似即境入於念名分真即無境無念名究竟即雖六常一何凡何聖雖一常六凡聖天絶此止觀大意讀者宜細意記云闡提不斷性善諸佛不斷性惡者善惡以無性為性此性即佛性即無性本即法性故不可斷也即今推自心性不可得即無住處能遍一切處即善惡性也性無善惡能生善惡善惡可斷性不可斷縱墮三途性善不滅性惡不增直至成佛性善不增性惡不滅此性即法身也猶如明鏡本無好醜衆像能現一切好醜衆像像有增減明淨光體不增減也鏡本無像故能現像性本無善惡能現善惡也衆生不得性但得善惡所拘不得自在也性善不壞故地獄發佛界性惡不壞故佛現六趣生也開一心為三止觀合三止觀歸一心者一心即三中圓頓也開出漸次不定并一心三也一心即三中一也開合對辨故有四種觀法成五百一十二安心也剋實只有三無第四一心即圓頓故也思議不思議俱十界者思議十界唯佛界極前九粗淺次第至極思議也不思議界界界具十不待至佛方妙極地獄即齊佛不可捨佛即地獄不可取何故爾此十界全我一念何以故有取捨者念未圓耳圓心往望法法皆圓無一毫塵在我念外也此意極大開懷抱盛取品得若取捨才生圓即遠矣圓頓往望漸次不定皆一心也漸次不定往望唯圓一心二非一心也故有開合或三或四或別明一心三即思議也一心即不思議也亦不全一亦不全異此段續前安心文今欲借別顯總舉次而論不次故先三義解釋者此上下文意竝前次後不次不次無多只一念即破即立即修即證無別觀智此理難信解行用須假次第故開門戶說或豎或橫或非橫非豎或從假入空從空入假或兩觀為方便得入中或先見假次思假如上所列竝借別顯總也若得別意一一別中悉圓極也就前根本都合三百四十八句者此中本末合計前四句三假合十二句又從四句出悉檀十二句合四十八悉檀并本十二計六十句又一悉檀出性相空合九十六性相空性相空九十六合前六十根本句計一百五十六句一一句各有止觀合一百九十二句止觀一百九十二合前一百五十六根本即都合三百四十八句此是子本合算法也後就四人四見能所自行化他都合七萬三千三百八十四句此直論計句不兼本算也不可說見如初有見但一千三百九十二句者此絶言見只約單四見句後出故只如此若約復具竝出即更兩倍今不出者隨作者意耳足前合為一千一百五十二者三百八十四句合七百六十八句也合根本一千一百六十四句者根本十二句也一品如此下直論不兼本算也不動不退方名薩埵薩埵唐云勇猛即是菩薩別名下文亦頻言薩埵恐不指薩埵王子一人器械鈍者別教道品歷別鈍也應云一人器械利者圓道品一念具利也文無者略耳記云身壯喻三諦兵利喻三止權多喻三觀今意謂三諦是髻珠戰具今取五緣中無緣慈即是行廣求佛智即智大行廣智大為身壯牢彊精進即是兵利滿弘誓大方便即是謀多也修中意者初心即修不待二觀成者倚在身壯兵利權多也古珠者了心性本源常具萬德不增不減不用鍛鍊體自明利也智障三義若從能障得名智即分別智此智即障若從所障得名智即中智智上有障如鏡有塵耳若能所對受名中智為他無明障如鏡在塵除塵鏡自明淨若斷不斷者從能得名此智須斷從所及對此智不斷非碩異者心性如水風鼓浪生浪生分別智也但斷其浪水不可斷也息風浪止空日自現空即止也日即觀也止觀現前萬德斯備空日在池萬象到景準新經論名所知障所知是智為無明所障所知家障亦能所受名也大品有菩薩從初發心即與薩婆若相應者準輔行引經三文釋云經列前深後淺今列從淺至深詳所引經前亦不深前是跋致位次是菩提位菩提豈淺於跋致但借彼文權為次第未必彼經剋定深淺攝佛威儀以十力無畏不共法等為威儀一念中修者只今學人一念圓解心具佛果中一切萬德萬德雖多以十二事攝盡此意不偏行位但言境智本體自具修與不修未曾增減本自圓足非新生也前三教人無眼不見凡夫外道都不知有我今圓解一念全收亦只是一念三千世間耳十界中有佛界佛界豈無德佛德乃三千中一分也有云佛性如木中火鑽研乃出此乃藏教析色得空全未及通況乃別圓仍引大師文云禿船鳥空此斥無圓解人妄執言即不得即意圓方有即汝未解圓學言即即故失也十力章云豈非初心有修有證三據明矣豈非正文宜審此段記云十意融通經論有人將對十乘深不便也但對五重玄義今詳文體釋名及明宗亦不便何必作此相對但消文意義理自明何用對十對五五悔名者從初懺悔受名取語便耳如云五拘鄰拘鄰是五人首也若準義合云拘鄰等五人新翻梵云懺摩唐云悔往今懺悔唐梵合舉我以善施衆生者記云今說果中故言共與若因時與將何成道今謂因果俱共施衆生此善是不思議回施他自善益勝後當重辨輔行云至菩薩境中應辨夏終不說下無所論今詳此指自是一途未必全爾何者十境明乘今當第一猶有九境九境十乘乘有法喻今才法說車喻猶明況後九境縱後三境無文尚有六境并陰境一喻總十三度說此無法愛入住之意在輔行將車對十乘云整足者今謂十乘是行路車是所乘乘此車行十乘路念念之中等一大車行乃至十方云整足故境文竟云若得悟者不俟餘九止觀第三第九竝明八教大師意頓等四為化儀為綱攝一代時教盡藏等四為法為網亦攝一代教盡若約法法華唯圓唯頓諸教諸理悉無比竝獨一無侶故文云即中捨三方便也若約化儀當第五時漸說也大師言唯華嚴頓餘悉屬漸輔行云法華涅槃非漸非頓色塵空塵皆具佛功德有大經卷經卷以法界為體法界在衆生心中法性心性無二無別心生即法生心滅即法滅心性無生滅而能遍生滅一念心外更無一毫法可得全此心性是法界性一念若有法界一時有一念若空法界一時空見一塵時全見法界理事萬德無不圓足或名佛性佛智佛德神通威儀經卷種種異名其體不易非新非故無得無失無時無處皆於今日一念上現了了分明是名圓頓止觀也一切法趣欲是趣不過不壞於身而隨一相貪欲即是道恚癡亦復然殃掘無減修吹即即唾一塵入正受一切三昧起如是等比類悉此一義具如義海中說於越州開元寺鈔寫此文大中九年二月十日日本國天台問法沙門囗王記義海是法藏和上作俗姓康本胡依儼受華嚴儼依杜順禪師姓杜此文殊化身具如傳録永仁六年三月十八日一校了相似沙門禪睿
